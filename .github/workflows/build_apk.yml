name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true

      - name: Generate Flutter platform files
        working-directory: flutter_app
        run: flutter create --platforms android .

      - name: Flutter pub get
        working-directory: flutter_app
        run: flutter pub get

      - name: Build APK (release)
        working-directory: flutter_app
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: spark-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          name: Spark ${{ github.ref_name }}
          body: |
            ## Spark ${{ github.ref_name }}

            Téléchargez `app-release.apk` et installez-le sur Android.

            > Activer "Sources inconnues" dans Paramètres → Sécurité si besoin.
