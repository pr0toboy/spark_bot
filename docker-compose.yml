services:
  spark:
    build: .
    image: spark-bot
    container_name: spark
    stdin_open: true
    tty: true
    restart: unless-stopped
    volumes:
      - spark_data:/data
    environment:
      - SPARK_DATA_DIR=/data
      # Optionnel — pré-remplir les clés sans passer par /login :
      # - ANTHROPIC_API_KEY=sk-ant-...
      # - GROQ_API_KEY=gsk_...

  spark-api:
    image: spark-bot
    container_name: spark-api
    restart: unless-stopped
    depends_on:
      - spark
    ports:
      - "8000:8000"
    volumes:
      - spark_data:/data
    environment:
      - SPARK_DATA_DIR=/data
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

volumes:
  spark_data:
