name: spark_app
description: Spark — assistant personnel CLI disponible sur web et mobile.
version: 1.5.0+6
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "logo.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "logo.png"

flutter:
  uses-material-design: true
