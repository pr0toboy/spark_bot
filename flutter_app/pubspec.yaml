name: spark_app
description: Spark — assistant personnel CLI disponible sur web et mobile.
version: 1.9.2+13
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.0
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  flutter_markdown_plus: ^1.0.7
  share_plus: ^10.0.0
  file_picker: ^8.0.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "logo.jpg"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "logo.jpg"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.jpg
